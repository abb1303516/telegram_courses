<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Курсы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-card">
        <h1>Мои курсы</h1>
        <p class="login-subtitle">Введите пароль для входа</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}" autocomplete="on">
            <!-- Hidden username for browser password manager -->
            <input type="text" name="username" value="user"
                   autocomplete="username" style="display:none" aria-hidden="true">
            <input
                type="password"
                name="password"
                placeholder="Пароль"
                autofocus
                required
                autocomplete="current-password"
                class="login-input"
            >
            <button type="submit" class="btn btn-primary btn-full">Войти</button>
        </form>
    </div>
</body>
</html>
